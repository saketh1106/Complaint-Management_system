<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complaint Management System - Staff</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ====== Global Styles ====== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: #F8FAFC;
  display: flex;
  min-height: 100vh;
}

/* ====== Sidebar ====== */
.sidebar {
  width: 240px;
  background: #EEF2FF;
  padding: 25px;
  position: fixed;
  height: 100%;
}

.sidebar h2 {
  color: #4F46E5;
  margin-bottom: 30px;
}

.sidebar a {
  display: block;
  text-decoration: none;
  color: #374151;
  padding: 12px;
  border-radius: 8px;
  margin-bottom: 8px;
  transition: 0.3s;
}

.sidebar a:hover {
  background: #6366F1;
  color: white;
}

/* ====== Main Content ====== */
.main {
  margin-left: 240px;
  width: 100%;
}

.navbar {
  background: white;
  padding: 15px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.navbar h3 {
  color: #1F2937;
}

.content {
  padding: 30px;
}

/* ====== Cards ====== */
.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.card h4 {
  color: #6B7280;
}

.card h2 {
  color: #4F46E5;
  margin-top: 10px;
}

/* ====== Table ====== */
table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

th, td {
  padding: 12px;
  text-align: left;
}

th {
  background: #EEF2FF;
}

tr:hover {
  background: #F1F5F9;
}

/* ====== Buttons ====== */
button {
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  background: #6366F1;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #4F46E5;
}

/* ====== Form Inputs ====== */
input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 15px;
  border: 1px solid #D1D5DB;
  border-radius: 8px;
}

form {
  max-width: 500px;
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

/* ====== Modal ====== */
.modal {
  display: none;
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  overflow: auto;
  background-color: rgba(0,0,0,0.5);
}

.modal-content {
  background: white;
  margin: 10% auto;
  padding: 20px;
  border-radius: 12px;
  width: 90%;
  max-width: 400px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.close-btn {
  float: right;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>
<body>

{% if messages %}
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const Toast = Swal.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 3000,
            timerProgressBar: true,
            didOpen: (toast) => {
                toast.addEventListener('mouseenter', Swal.stopTimer)
                toast.addEventListener('mouseleave', Swal.resumeTimer)
            }
        });

        {% for message in messages %}
            Toast.fire({
                icon: "{% if message.tags == 'success' %}success{% elif message.tags == 'error' %}error{% else %}info{% endif %}",
                title: "{{ message|escapejs }}"
            });
        {% endfor %}
    </script>
{% endif %}

{% if user.is_authenticated %}
    <div class="sidebar">
        <h2>CMS Staff</h2>
        <a href="{% url 'staff_dashboard' %}">Dashboard</a>
        <a href="{% url 'staff_chat_list' %}">Chat</a>
        <a href="{% url 'staff_update_status' %}">Update Status</a>
        <a href="{% url 'staff_profile' %}">Profile</a>
        <a href="{% url 'logout' %}">Logout</a>
    </div>

    <div class="main">
        <div class="navbar">
            <h3>Complaint Management System</h3>
        </div>
        <div class="content">
            {% block dashboard_content %}{% endblock %}
        </div>
    </div>

    <div id="updateStatusModal" class="modal">
      <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h3>Update Complaint Status</h3>
        <form method="POST" action="{% url 'update_status' %}">
          {% csrf_token %}
          <input type="hidden" name="complaint_id" id="complaint_id">
          <label for="status">Status</label>
          <select name="status" id="status" required>
            <option value="">--Select Status--</option>
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="Resolved">Resolved</option>
          </select>
          <button type="submit">Update</button>
        </form>
      </div>
    </div>

    <script>
    function openModal(id) {
      document.getElementById('complaint_id').value = id;
      document.getElementById('updateStatusModal').style.display = 'block';
    }

    function closeModal() {
      document.getElementById('updateStatusModal').style.display = 'none';
    }

    window.onclick = function(event) {
      const modal = document.getElementById('updateStatusModal');
      if (event.target == modal) modal.style.display = "none";
    }
    </script>

{% else %}
    <div class="content" style="width:100%; padding:50px;">
        {% block auth_content %}{% endblock %}
    </div>
{% endif %}

</body>
</html>
