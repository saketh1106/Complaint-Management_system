<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        body{ background:#F8FAFC; display:flex; min-height:100vh; }
        .sidebar{ width:240px; background:#EEF2FF; padding:25px; position:fixed; height:100%; border-right: 1px solid #E2E8F0; }
        .sidebar h2{ color:#4F46E5; margin-bottom:30px; font-size: 1.3rem; }
        .sidebar a{ display:block; text-decoration:none; color:#374151; padding:12px; border-radius:8px; margin-bottom:8px; transition:0.3s; font-size: 0.9rem; position: relative; }
        .sidebar a:hover{ background:#6366F1; color:white; }
        .main{ margin-left:240px; width:100%; }
        .navbar{ background:white; padding:15px 25px; display:flex; justify-content:space-between; align-items:center; box-shadow:0 2px 8px rgba(0,0,0,0.05); }
        .content-area{ padding:30px; }
        
        /* Notification Dot Styling */
        .dot {
            height: 10px;
            width: 10px;
            background-color: #EF4444;
            border-radius: 50%;
            display: inline-block;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            border: 2px solid #EEF2FF;
        }
        .sidebar a:hover .dot { border-color: #6366F1; }

        /* Form and Table Styles */
        table{ width:100%; border-collapse:collapse; background:white; border-radius:12px; overflow:hidden; box-shadow:0 4px 10px rgba(0,0,0,0.05); margin-top:20px; }
        th,td{ padding:15px; text-align:left; border-bottom:1px solid #F1F5F9; }
        th{ background:#F8FAFC; color:#64748B; font-weight:600; text-transform:uppercase; font-size:0.8rem; }
        .btn{ padding:8px 16px; border-radius:6px; border:none; cursor:pointer; font-weight:500; transition:0.2s; text-decoration:none; display:inline-block; }
        .btn-success{ background:#10B981; color:white; }
        .btn-danger{ background:#EF4444; color:white; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #E2E8F0; border-radius: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>CMS Admin</h2>
    <a href="{% url 'admin_dashboard' %}">Dashboard</a>
    <a href="{% url 'assign_complaints' %}">Assign Complaints</a>
    <a href="{% url 'staff_management' %}">Staff Management</a>
    <a href="{% url 'user_management' %}">User Management</a>
    
    <a href="{% url 'admin_chat' %}">
        Chat 
        {% if unread_chats_count > 0 %}
            <span class="dot"></span>
        {% endif %}
    </a>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #E2E8F0;">
    <a href="{% url 'logout' %}" style="color: #EF4444;">Logout</a>
</div>

<div class="main">
    <div class="navbar">
        <h3>Admin Dashboard</h3>
        <div style="font-size: 0.8rem; color: #64748b;">Logged in as: <strong>{{ user.username }}</strong></div>
    </div>
    <div class="content-area">
        {% block dashboard_content %}{% endblock %}
    </div>
</div>

</body>
</html>
